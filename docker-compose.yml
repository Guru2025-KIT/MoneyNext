
services:
  postgres:
    image: postgres:15-alpine
    container_name: moneynext-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moneynext
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moneynext-network

  redis:
    image: redis:7-alpine
    container_name: moneynext-redis
    command: redis-server --requirepass redis123
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - moneynext-network

  backend:
    build:
      context: .
      dockerfile: ./docker/backend.Dockerfile
    container_name: moneynext-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moneynext?schema=public
      REDIS_HOST: redis
      REDIS_PASSWORD: redis123
      JWT_SECRET: dev-jwt-secret
      PORT: 3001
    ports:
      - '3001:3001'
      - "5555:5555"
    volumes:
      - ./apps/backend:/app/apps/backend
      - /app/apps/backend/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - moneynext-network

  frontend:
    build:
      context: .
      dockerfile: ./docker/frontend.Dockerfile
    container_name: moneynext-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - '3000:3000'
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - moneynext-network

  worker:
    build:
      context: .
      dockerfile: ./docker/worker.Dockerfile
    container_name: moneynext-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/moneynext?schema=public
      REDIS_HOST: redis
      REDIS_PASSWORD: redis123
    volumes:
      - ./apps/worker:/app/apps/worker
      - /app/apps/worker/node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - moneynext-network

networks:
  moneynext-network:

volumes:
  postgres_data:
  redis_data:
